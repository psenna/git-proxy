# Upstream credentials the proxy attaches on the proxy -> GitHub leg.
# The agent NEVER sees these. The proxy resolves credentials by the repository
# path it forwards (here "OWNER/REPO.git" -> GitHub owner "OWNER", repo "REPO.git").
#
# This is the PROFILE layout (a list under `credentials:`). Each profile maps a
# set of repository patterns (here the single repo "OWNER/REPO.git") to the
# upstream credentials the proxy uses on that leg. Wildcard patterns like
# "myorg/*" are also allowed; bare "*" and "**" are not.
#
# The SAME GitHub PAT serves both legs:
#   - git protocol (clone/fetch/push): HTTP Basic with username "x-access-token" +
#     the PAT as the password. GitHub accepts this canonical form for both classic
#     and fine-grained PATs. (internal/upstream/plain/plain.go applyCreds reads
#     only username/password.)
#   - broker REST (PR + CI): Bearer, read from the `token` field.
#     (internal/upstream/github/github.go restClient/tokenFor reads `token`.)
#
# Env override (env > file > empty): setting GITHUB_USERNAME, GITHUB_PASSWORD, or
# GITHUB_TOKEN overrides the file value for this profile (the env-var name is the
# profile name uppercased). This lets docker-compose.yml inject the PAT via an
# env var instead of editing this file.
#
# Replace OWNER/REPO with your repo and the two REPLACE_WITH_GITHUB_PAT values
# with your own PAT, then `docker compose restart git-proxy`. NEVER commit a
# real PAT.

credentials:
  - name: GITHUB
    description: "GitHub PAT for the agent's repo (git protocol + broker)"
    username: x-access-token
    password: REPLACE_WITH_GITHUB_PAT
    token: REPLACE_WITH_GITHUB_PAT
    repos:
      - "OWNER/REPO.git"