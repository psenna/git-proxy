# Upstream credentials the proxy attaches on the proxy -> GitHub leg.
# The agent NEVER sees these. The proxy looks up creds by the repository path it
# forwards (here "OWNER/REPO.git" -> GitHub owner "OWNER", repo "REPO.git").
#
# The SAME GitHub PAT serves both legs:
#   - git protocol (clone/fetch/push): HTTP Basic with username "x-access-token" +
#     the PAT as the password. GitHub accepts this canonical form for both classic
#     and fine-grained PATs. (internal/upstream/plain/plain.go applyCreds reads only
#     username/password.)
#   - broker REST (PR + CI): Bearer, read from the `token` field.
#     (internal/upstream/github/github.go restClient/tokenFor reads `token`.)
#
# Replace OWNER/REPO with your repo and the two REPLACE_WITH_GITHUB_PAT values with
# your own PAT, then `docker compose restart git-proxy`. NEVER commit a real PAT.

credentials:
  "OWNER/REPO.git":
    username: x-access-token
    password: REPLACE_WITH_GITHUB_PAT
    token: REPLACE_WITH_GITHUB_PAT