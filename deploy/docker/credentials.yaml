# Upstream credentials the proxy attaches on the proxy -> Gitea leg.
# The agent NEVER sees these. The proxy resolves credentials by the repository
# path it forwards (here "demo/demo.git" -> Gitea owner "demo", repo "demo.git").
#
# This is the PROFILE layout (a list under `credentials:`). Each profile maps a
# set of repository patterns (here the single repo "demo/demo.git") to the
# upstream credentials the proxy uses on that leg. Wildcard patterns like
# "myorg/*" are also allowed; bare "*" and "**" are not.
#
# Env override (env > file > empty): setting GITEA_USERNAME, GITEA_PASSWORD, or
# GITEA_TOKEN overrides the file value for this profile (the env-var name is the
# profile name uppercased). This lets docker-compose.yml inject the Gitea access
# token via an env var instead of editing this file.
#
# Fill in the Gitea access token as the password after the one-time setup in
# ./README.md (Gitea accepts Basic auth with username + personal access token
# for git HTTP operations), then `docker compose restart git-proxy`.

credentials:
  - name: GITEA
    description: "Gitea access token for the demo repo (proxy -> Gitea leg)"
    username: demo
    password: REPLACE_WITH_GITEA_ACCESS_TOKEN
    repos:
      - "demo/demo.git"