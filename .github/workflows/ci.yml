name: ci

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  lint:
    name: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"
          cache: false
      - name: install golangci-lint
        # Build golangci-lint from source with the CI Go toolchain. The
        # prebuilt v1.64.8 binary is built with go1.24 and cannot typecheck
        # go1.25+ stdlib files; GOTOOLCHAIN=local prevents `go install` from
        # downloading go1.24 per v1.64.8's toolchain directive. Pin v1.64.8
        # to keep the v1 .golangci.yml config format.
        run: GOTOOLCHAIN=local go install github.com/golangci/golangci-lint/cmd/golangci-lint@v1.64.8
      - name: golangci-lint
        run: golangci-lint run --timeout 5m

  build:
    name: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"
      - name: go build
        run: go build ./...

  test:
    name: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"
      - name: go vet
        run: go vet ./...
      - name: go test
        run: go test -race -coverprofile=cover.out ./...
      - name: upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: cover.out
          if-no-files-found: warn

  vulncheck:
    name: vulncheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"
      - name: install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest
      - name: govulncheck
        run: govulncheck ./...

  # Build the Docker image so the Dockerfile cannot silently rot. No push, no
  # registry login — just a build gate mirroring the source `go build` job.
  docker:
    name: docker build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: build image
        run: docker build -t git-proxy:ci .